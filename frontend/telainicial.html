<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela Inicial - APS - Sistema Bancário</title>
    <link rel="stylesheet" href="telainicial.css">
</head>
<body>

    <section id="card">

        <h1>Seja bem-vindo!</h1>

        <div class="botoes">
            <button id="btnConta">Minha Conta</button>
            <button id="btnsaldo">Saldo</button>
            <button id="btnsaque">Saque</button>
            <button id="btndeposito">Depósito</button>
            <button id="btntransferencia">Transferências</button>
            <button id="btngerenciarConta">Gerenciar Conta</button>
            <button id="btnLogout">Sair da conta</button>

        </div>

        <div id="conta" class="secao" style="display: none;">
            <h1>Minha Conta</h1>
            <p id="msgConta"></p>
        </div>

        <div id="saldo" class="secao" style="display: none;">
            <h2>Seu saldo</h2>
            <p id="valorSaldo">Carregando...</p>
        </div>

        <div id="saque" class="secao" style="display: none;">
            <h2>Saque</h2>
            <input type="number" id="valorSaque" placeholder="Quanto deseja sacar?" required>
            <br><br><button id="confirmarSaque">Sacar</button>

            <p id="msgSaque"></p>
        </div>


        <div id="deposito" class="secao" style="display: none;">
            <h2>Depósito</h2>
            <input type="number" id="valorDeposito" placeholder="Quanto deseja depositar?" required>
            <br><br><button id="confirmarDeposito">Depositar</button>
            <p id="msgDeposito"></p>
        </div>


        <div id="transferencia" class="secao" style="display: none;">
            <h2>Transferências</h2>
            <input type="number" id="idDestino" placeholder="Digite o id da conta que deseja transferir" required><br>
            <br><input type="number" id="valorTransferencia" placeholder="Digite o valor da transferência" required><br>
            <br><input type="password" id="senhaTransferir" placeholder="Digite a sua senha" required>
            <br><br><button id="confirmarTransferencia">Transferir</button>
            <p id="msgTransferencia"></p>
        </div>


        <div id="gerenciarConta" class="secao" style="display:none;">
            <h2>Gerencia Conta</h2>
            <br>
            <div id="msg"></div>
        </div>

        </div>

        <img src="logoimg.png" alt="logo" id="img">

        
    </section>

    <footer>
        <p>&copy; AdailtonPereira</p>
    </footer>

<script src="/telaInicialJS/telainicial.js"></script>
</body>
</html>
